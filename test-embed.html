<!DOCTYPE html>
<html>
<head>
    <title>Test Embed</title>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; }
        h1 { color: #1B3A5C; }
        iframe { border: 2px solid #ccc; margin-top: 20px; }
        .info { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Casper Youth Hub Map - Embed Test</h1>
    
    <div class="info">
        <strong>Testing embed URL:</strong> https://casperyouthhubmap.org/#/embed
    </div>
    
    <h2>Embedded Map (Production):</h2>
    <iframe 
        src="https://casperyouthhubmap.org/#/embed" 
        width="100%" 
        height="600"
        title="Casper Youth Hub Map">
    </iframe>
    
    <h2>Embedded Map (Local - if running):</h2>
    <iframe 
        src="http://localhost:3000/#/embed" 
        width="100%" 
        height="600"
        title="Casper Youth Hub Map Local">
    </iframe>
    
    <script>
        console.log('Test page loaded');
        console.log('Production embed URL: https://casperyouthhubmap.org/#/embed');
        console.log('Local embed URL: http://localhost:3000/#/embed');
        
        // Listen for console errors from iframes (won't work due to CORS, but good to try)
        window.addEventListener('error', function(e) {
            console.error('Error detected:', e);
        });
    </script>
</body>
</html>
